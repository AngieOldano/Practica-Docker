# archivo de configuracion que voy a enganchar como volumen a un contenedor de nginx
# aca voy a balancear la carga entre aplicaciones

upstream api {
  server app1:3005;
  server app2:3005;
}

server {
  listen 80;
  location / {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
